<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="glow" cx="256" cy="256" r="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ufoGrad" x1="156" y1="180" x2="356" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="beamGrad" x1="256" y1="280" x2="256" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="domeGrad" x1="226" y1="140" x2="286" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="256" cy="256" r="240" fill="url(#glow)"/>

  <!-- UFO body - saucer shape -->
  <ellipse cx="256" cy="260" rx="120" ry="32" fill="url(#ufoGrad)" filter="url(#outerGlow)"/>

  <!-- UFO body bottom edge highlight -->
  <ellipse cx="256" cy="260" rx="120" ry="32" fill="none" stroke="#e9d5ff" stroke-width="1.5" opacity="0.4"/>

  <!-- UFO dome -->
  <ellipse cx="256" cy="228" rx="50" ry="40" fill="url(#domeGrad)" opacity="0.9"/>

  <!-- Dome reflection -->
  <ellipse cx="242" cy="212" rx="18" ry="14" fill="white" opacity="0.25"/>

  <!-- UFO top rim -->
  <ellipse cx="256" cy="228" rx="50" ry="8" fill="#a855f7" opacity="0.6"/>

  <!-- UFO bottom rim -->
  <ellipse cx="256" cy="292" rx="70" ry="10" fill="#6366f1" opacity="0.5"/>

  <!-- Lights on UFO rim -->
  <circle cx="176" cy="260" r="5" fill="#06b6d4" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="216" cy="248" r="5" fill="#06b6d4" opacity="0.9">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="243" r="5" fill="#06b6d4" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="296" cy="248" r="5" fill="#06b6d4" opacity="0.9">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="336" cy="260" r="5" fill="#06b6d4" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="0.7s" repeatCount="indefinite"/>
  </circle>

  <!-- Tractor beam -->
  <polygon points="226,290 286,290 340,480 172,480" fill="url(#beamGrad)"/>

  <!-- Beam lines -->
  <line x1="256" y1="290" x2="256" y2="460" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
  <line x1="240" y1="290" x2="210" y2="460" stroke="#06b6d4" stroke-width="0.8" opacity="0.2"/>
  <line x1="272" y1="290" x2="302" y2="460" stroke="#06b6d4" stroke-width="0.8" opacity="0.2"/>

  <!-- Download arrow inside beam -->
  <g transform="translate(256, 370)" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9">
    <line x1="0" y1="-20" x2="0" y2="15"/>
    <polyline points="-12,5 0,18 12,5"/>
  </g>

  <!-- Stars around UFO -->
  <circle cx="120" cy="140" r="2" fill="white" opacity="0.6"/>
  <circle cx="380" cy="130" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="90" cy="300" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="420" cy="280" r="2" fill="white" opacity="0.5"/>
  <circle cx="150" cy="380" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="400" cy="400" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="60" cy="210" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="450" cy="180" r="2" fill="white" opacity="0.5"/>
</svg>